name: Monthly Retrain

on:
  # Runs on the 12th — after SSB publishes (~10th) and the new print is ingested
  schedule:
    - cron: "0 6 12 * *"
  workflow_dispatch:

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install .

      - name: Fetch latest SSB print
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m db.fetch_ssb_history

      - name: Export training data
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m db.export_training_data --output model/artifacts/training_data.csv

      - name: Train model
        run: python -m model.train --data model/artifacts/training_data.csv --output model/artifacts/xgb_latest.json

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: xgb-model-${{ github.run_id }}
          path: model/artifacts/xgb_latest.json
          retention-days: 90

      - name: Backfill historical predictions with new model
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m model.backfill_predictions --from 2020-01

      - name: Commit updated model
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add model/artifacts/xgb_latest.json model/artifacts/training_data.csv
          git diff --cached --quiet || git commit -m "chore: retrain model $(date +%Y-%m)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
