name: Daily Price Scraper

on:
  schedule:
    - cron: "0 2 * * *"   # 02:00 UTC daily (03:00/04:00 Norwegian time)
  workflow_dispatch:        # Manual trigger for testing

jobs:
  scrape-and-index:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install .

      - name: Run price scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          KASSAL_API_KEY: ${{ secrets.KASSAL_API_KEY }}
        run: python -m scraper.main

      - name: Compute daily index
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m indexer.run_daily

  nowcast:
    runs-on: ubuntu-latest
    needs: scrape-and-index
    # Only run on the 1st of each month
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.event.schedule, '0 2 1 ') }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install .

      - name: Run monthly nowcast
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          KASSAL_API_KEY: ${{ secrets.KASSAL_API_KEY }}
        run: python -m model.predict
